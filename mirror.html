<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسارك للـ +95 | منصة التحصيلي الشاملة</title>
    <meta name="description" content="دليلك الشامل للتحصيلي: خطط مذاكرة ذكية، نصائح ذهبية من أصحاب الخبرة، تجارب المتفوقين. مجاني بالكامل!">
    <meta name="keywords" content="تحصيلي, خطة مذاكرة, تجميعات, ناصر عبدالكريم, يلو, غشام, +95, اختبار التحصيلي">
    <meta property="og:title" content="مسارك للـ +95 | منصة التحصيلي الشاملة">
    <meta property="og:description" content="دليلك الشامل للتحصيلي: خطط مذاكرة ذكية، تجارب المتفوقين، نصائح ذهبية. مجاني بالكامل!">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="مسارك للـ +95 | منصة التحصيلي الشاملة">
    <meta name="twitter:description" content="دليلك الشامل للتحصيلي: خطط مذاكرة ذكية، تجارب المتفوقين. مجاني!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: #0a1a0d; font-family: 'Cairo', sans-serif; }

        /* Loading Screen */
        .loader {
            position: fixed; inset: 0; z-index: 9999;
            background: linear-gradient(135deg, #0a1a0d 0%, #0f2912 50%, #0a1a0d 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        .loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loader-icon {
            font-size: 3rem; margin-bottom: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{ transform:scale(1); opacity:0.8; } 50%{ transform:scale(1.15); opacity:1; } }
        .loader h2 {
            font-size: 1.5rem; font-weight: 800;
            background: linear-gradient(135deg, #7EC88B, #E8A849);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .loader-bar {
            width: 220px; height: 4px; background: rgba(126,200,139,0.15);
            border-radius: 99px; overflow: hidden;
        }
        .loader-bar-fill {
            width: 0%; height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #7EC88B, #E8A849);
            animation: load 1.8s ease-in-out forwards;
        }
        @keyframes load { 0%{width:0%} 60%{width:80%} 100%{width:100%} }
        .loader-tip {
            margin-top: 25px; color: rgba(255,255,255,0.4); font-size: 0.85rem;
            max-width: 300px; text-align: center; line-height: 1.7;
        }

        /* Iframe */
        iframe {
            width: 100%; height: 100%; border: none;
            opacity: 0; transition: opacity 0.4s ease;
        }
        iframe.loaded { opacity: 1; }

        /* Error state */
        .error-state {
            display: none; position: fixed; inset: 0; z-index: 9998;
            background: #0a1a0d; flex-direction: column;
            align-items: center; justify-content: center; text-align: center; padding: 30px;
        }
        .error-state.show { display: flex; }
        .error-state h2 { color: #7EC88B; font-size: 1.4rem; margin: 15px 0 10px; }
        .error-state p { color: rgba(255,255,255,0.5); font-size: 0.95rem; margin-bottom: 20px; line-height: 1.8; }
        .error-btn {
            display: inline-flex; align-items: center; gap: 8px;
            background: linear-gradient(135deg, #7EC88B, #5BA8C8);
            color: #0a1a0d; padding: 12px 28px; border-radius: 12px;
            text-decoration: none; font-weight: 800; font-size: 1rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .error-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(126,200,139,0.3); }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <div class="loader-icon">🎓</div>
        <h2>مسارك للـ +95</h2>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
        <p class="loader-tip">جاري تحميل منصة التحصيلي...</p>
    </div>

    <!-- Error State -->
    <div class="error-state" id="errorState">
        <div style="font-size:3rem">😔</div>
        <h2>تعذّر تحميل الموقع</h2>
        <p>قد يكون الاتصال بالإنترنت ضعيفاً أو الموقع تحت الصيانة.<br>جرّب الرابط المباشر:</p>
        <a href="https://bugbountysaburtilz1404test-blip.github.io/tahsili-plan/" class="error-btn">
            🚀 افتح الموقع مباشرة
        </a>
    </div>

    <!-- Main Content -->
    <iframe 
        id="mainFrame"
        src="https://bugbountysaburtilz1404test-blip.github.io/tahsili-plan/" 
        allowfullscreen
        loading="eager"
        title="مسارك للـ +95 — منصة التحصيلي الشاملة">
    </iframe>

    <script>
        const frame = document.getElementById('mainFrame');
        const loader = document.getElementById('loader');
        const errorState = document.getElementById('errorState');
        let loaded = false;

        // When iframe loads successfully
        frame.addEventListener('load', () => {
            loaded = true;
            setTimeout(() => {
                loader.classList.add('hidden');
                frame.classList.add('loaded');
            }, 800); // Small delay for smooth transition
        });

        // Timeout fallback — if iframe doesn't load in 12s, show error
        setTimeout(() => {
            if (!loaded) {
                loader.classList.add('hidden');
                errorState.classList.add('show');
            }
        }, 12000);

        // Handle iframe errors
        frame.addEventListener('error', () => {
            loader.classList.add('hidden');
            errorState.classList.add('show');
        });
    </script>
</body>
</html>
